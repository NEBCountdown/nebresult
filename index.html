<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSmart - Smart Learning Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-container">
        <div id="signup-box">
            <h2>Join EduSmart</h2>
            <p class="subtitle">Your digital portal for SEE & NEB excellence</p>
            <form id="signup-form">
                <div class="input-group">
                    <label for="signup-name">Full Name</label>
                    <input type="text" id="signup-name" required placeholder="Your Name">
                </div>
                <div class="input-group">
                    <label for="signup-email">Email Address</label>
                    <input type="email" id="signup-email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="••••••••">
                </div>
                <div class="input-group">
                    <label for="signup-level">Academic Level</label>
                    <select id="signup-level" required>
                        <option value="class10">Class 10 (SEE)</option>
                        <option value="class12">Class 12 (NEB)</option>
                    </select>
                </div>
                <button type="submit" class="btn-submit">Create Free Account</button>
            </form>
            <p class="toggle-auth">Already have an account? <span onclick="toggleAuthForms()">Login</span></p>
        </div>

        <div id="login-box" class="hidden">
            <h2>Welcome Back</h2>
            <p class="subtitle">Log in to resume your progress</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" required placeholder="name@example.com">
                </div>
                <div class="input-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-submit">Sign In</button>
            </form>
            <p class="toggle-auth">Don't have an account? <span onclick="toggleAuthForms()">Sign Up</span></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
